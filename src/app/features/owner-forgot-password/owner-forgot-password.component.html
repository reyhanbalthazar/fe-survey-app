<section class="forgot-page">
  <div class="card">
    <h1>Forgot Password</h1>
    <p>Enter your registered email address and we will send you a password reset link.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="owner@email.com" />

      <button type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>

    @if (successMessage) {
      <p class="success">{{ successMessage }}</p>
    }

    <small><a routerLink="/owner/login">Back to login</a></small>
  </div>
</section>
