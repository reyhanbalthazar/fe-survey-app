<section class="reset-page">
  <div class="card">
    <h1>Reset Password</h1>
    <p>Set a new password for <strong>{{ email || 'your account' }}</strong>.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="password">New Password</label>
      <input id="password" type="password" formControlName="password" placeholder="minimum 8 characters" />

      <label for="password_confirmation">Confirm New Password</label>
      <input
        id="password_confirmation"
        type="password"
        formControlName="password_confirmation"
        placeholder="repeat your new password"
      />

      @if (passwordMismatch) {
        <p class="error">Password and confirmation password must match.</p>
      }

      <button type="submit" [disabled]="loading || form.invalid || passwordMismatch">
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <small><a routerLink="/owner/login">Back to login</a></small>
  </div>
</section>
